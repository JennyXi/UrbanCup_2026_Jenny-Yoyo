name: tests

on:
  push:
    branches: [Yoyo]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit and mechanism tests
        run: python -B -X utf8 -m unittest discover -s tests -v
      - name: Verify generated competition artifacts
        run: python -B -X utf8 -m scripts.build_competition_report --check
